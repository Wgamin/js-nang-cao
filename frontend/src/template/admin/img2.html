<html lang="vi"><head>

            "background": "#f7f9fb",

            "on-surface": "#191c1e",
            "on-secondary-fixed": "#00174b",
            "on-error-container": "#93000a",
            "on-surface-variant": "#434655",
            "surface-bright": "#f7f9fb",
            "surface-variant": "#e0e3e5",
            "surface-dim": "#d8dadc",
            "inverse-surface": "#2d3133",
            "on-tertiary-fixed": "#360f00",
            "surface-tint": "#0053db",
            "on-secondary": "#ffffff",
            "on-primary-fixed-variant": "#003ea8",
            "primary-fixed": "#dbe1ff",
            "outline": "#737686",
            "tertiary": "#943700",
            "primary-container": "#2563eb",
            "outline-variant": "#c3c6d7",
            "on-primary-fixed": "#00174b",
            "on-error": "#ffffff",
            "inverse-primary": "#b4c5ff",

            "surface-container": "#eceef0",
            "secondary-fixed-dim": "#b4c5ff",
            "on-tertiary-container": "#ffede6",
            "tertiary-container": "#bc4800",
            "primary-fixed-dim": "#b4c5ff",
            "tertiary-fixed": "#ffdbcd",

          "borderRadius": {

<style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .modal-backdrop {
      background: rgba(25, 28, 31, 0.4);
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body class="bg-surface text-on-surface flex items-center justify-center min-h-screen p-6 overflow-hidden">
<!-- Background Content Simulation (Dashboard Context) -->
<aside class="fixed left-0 top-0 flex flex-col py-6 px-4 h-screen w-64 bg-slate-50 opacity-20 pointer-events-none">
<div class="mb-10 px-2">
<h1 class="text-xl font-bold tracking-tighter text-blue-700">EduManager</h1>
<p class="text-xs text-slate-500">Hệ thống quản lý</p>
</div>
<nav class="space-y-1">
<div class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500"><span class="material-symbols-outlined">dashboard</span> Bảng điều khiển</div>
<div class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-blue-700 font-semibold border-r-4 border-blue-600 bg-slate-200/50"><span class="material-symbols-outlined">book</span> Môn học</div>
<div class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500"><span class="material-symbols-outlined">meeting_room</span> Phòng học</div>
</nav>
</aside>
<main class="ml-64 w-full max-w-5xl opacity-20 pointer-events-none">
<header class="flex justify-between items-center mb-8">
<h2 class="text-2xl font-extrabold tracking-tight text-on-surface">Danh sách môn học</h2>
<button class="px-5 py-2 bg-primary text-on-primary rounded-lg font-medium">Thêm mới</button>
</header>
<div class="grid grid-cols-3 gap-6">
<div class="h-48 bg-surface-container-low rounded-xl"></div>
<div class="h-48 bg-surface-container-low rounded-xl"></div>
<div class="h-48 bg-surface-container-low rounded-xl"></div>
</div>
</main>
<!-- Confirm Delete Modal Overlay -->
<div class="fixed inset-0 modal-backdrop z-50 flex items-center justify-center p-4">
<div class="relative w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-[0px_20px_40px_rgba(0,74,198,0.05)] overflow-hidden">
<!-- Modal Header Style: Subtle Layering -->
<div class="pt-8 pb-4 px-8 flex flex-col items-center text-center">
<!-- Icon Container -->
<div class="mb-5 w-16 h-16 rounded-full bg-error-container flex items-center justify-center">
<span class="material-symbols-outlined text-error text-3xl" style="font-variation-settings: 'wght' 500;">delete_forever</span>
</div>
<h3 class="text-xl font-bold text-on-surface tracking-tight mb-2">Xác nhận xóa môn học</h3>
<div class="px-4">
<p class="text-on-surface-variant leading-relaxed body-lg">
            Bạn có chắc chắn muốn xóa môn học này? <br/>
<span class="text-error font-medium">Hành động này không thể hoàn tác.</span>
</p>
</div>
</div>
<!-- Course Detail Preview (The Curator's Touch) -->
<div class="mx-8 mb-8 p-4 bg-surface-container-low rounded-lg flex items-center gap-4">
<div class="w-12 h-12 rounded-lg overflow-hidden flex-shrink-0">
<img class="w-full h-full object-cover" data-alt="Modern educational textbook cover with clean typography and abstract geometric shapes in soft blue colors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCwp8XL3K7dz9Jl6CXONmpGaaWWNg1yK2gvQQlY0GNsfmXVkl3tB8qAsHKjY_xehGtYsisWhO25A93sZfjrI729boCxndwO5ej03hJnD3cPwC6YorVS2TZheCvHgVRxvBjpntV78vrWgL_WO0XL0Q3tdSJEprOfi85rD2mkdoaEY-Jc5hw2uueOHlAc_p5xrOZcgI5ZYhmhi7FETz3RT0_wRt5GKtVETo42exEmm86JHqBZH8u385Ep3vgDrkf9HLX6GLu-AboUZ30w"/>
</div>
<div class="flex-grow">
<p class="text-xs font-bold uppercase tracking-widest text-on-surface-variant opacity-60">Mã môn học: MH-102</p>
<p class="font-semibold text-on-surface">Toán cao cấp A1</p>
</div>
</div>
<!-- Modal Actions: Asymmetric Focus -->
<div class="flex flex-col sm:flex-row gap-3 px-8 pb-8">
<button class="flex-1 order-2 sm:order-1 px-6 py-3 rounded-lg font-semibold text-on-surface-variant bg-surface-container-high hover:bg-surface-variant transition-all active:scale-95 duration-150">
          Quay lại
        </button>
<button class="flex-[1.5] order-1 sm:order-2 px-6 py-3 rounded-lg font-semibold text-on-primary bg-gradient-to-r from-error to-[#d32f2f] shadow-lg shadow-error/20 hover:opacity-90 transition-all active:scale-95 duration-150 flex items-center justify-center gap-2">
          Xác nhận xóa
        </button>
</div>
<!-- Subtle Ghost Border at Bottom for tactile feel -->
<div class="h-1 bg-error/10 w-full"></div>
</div>
</div>
</body></html>
